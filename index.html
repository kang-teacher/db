<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChatGPT API 질문 답변 페이지</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #e3f2fd, #fce4ec);
      font-family: Arial, sans-serif;
      color: #333;
    }

    .container {
      width: min(900px, 92%);
      margin: 40px auto;
      background: #ffffff;
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.16);
    }

    h1 {
      margin: 0 0 8px;
      text-align: center;
      font-size: 28px;
    }

    .subtitle {
      text-align: center;
      color: #777;
      margin-bottom: 24px;
      font-size: 14px;
    }

    .warning {
      padding: 14px;
      margin-bottom: 20px;
      border-radius: 14px;
      background: #fff8e1;
      color: #6d4c41;
      font-size: 14px;
      line-height: 1.6;
    }

    .chat-box {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    textarea {
      width: 100%;
      min-height: 130px;
      resize: vertical;
      padding: 16px;
      border: 1px solid #ddd;
      border-radius: 16px;
      font-size: 16px;
      line-height: 1.5;
      outline: none;
      font-family: Arial, sans-serif;
    }

    textarea:focus {
      border-color: #42a5f5;
      box-shadow: 0 0 0 3px rgba(66, 165, 245, 0.15);
    }

    .button-row {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      flex-wrap: wrap;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 0 18px;
      height: 46px;
      font-size: 15px;
      cursor: pointer;
      transition: 0.15s;
      font-weight: bold;
    }

    button:hover {
      transform: translateY(-2px);
      opacity: 0.9;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.6;
      transform: none;
    }

    .ask-btn {
      background: #42a5f5;
      color: white;
    }

    .clear-btn {
      background: #b0bec5;
      color: white;
    }

    .answer-box {
      min-height: 180px;
      padding: 18px;
      border-radius: 18px;
      background: #f7f9fb;
      border: 1px solid #edf1f5;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .status {
      min-height: 24px;
      color: #555;
      font-size: 14px;
    }

    .label {
      font-weight: bold;
      margin-bottom: 6px;
    }

    .option-box {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }

    input, select {
      height: 44px;
      padding: 0 12px;
      border: 1px solid #ddd;
      border-radius: 12px;
      font-size: 14px;
      outline: none;
    }

    @media (max-width: 700px) {
      .option-box {
        grid-template-columns: 1fr;
      }

      .button-row {
        justify-content: stretch;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>ChatGPT API 질문 답변</h1>
    <div class="subtitle">GitHub Pages에서 OpenAI API를 직접 호출하는 학습용 예제</div>

    <div class="warning">
      주의: 이 방식은 API Key가 웹페이지 코드에 노출됩니다. 공개 저장소나 실제 서비스에서는 사용하지 않는 것이 좋습니다.
      학습용 테스트 후에는 API Key를 삭제하거나 재발급하는 것을 권장합니다.
    </div>

    <div class="option-box">
      <select id="modelSelect">
        <option value="gpt-4.1-mini">gpt-4.1-mini</option>
        <option value="gpt-4.1">gpt-4.1</option>
        <option value="gpt-4o-mini">gpt-4o-mini</option>
      </select>
      <input id="systemInput" type="text" value="너는 친절한 한국어 AI 선생님이야." placeholder="AI 역할 설정" />
    </div>

    <div class="chat-box">
      <div>
        <div class="label">질문</div>
        <textarea id="questionInput" placeholder="질문을 입력하세요. 예: 고등학생에게 파이썬 반복문을 쉽게 설명해줘."></textarea>
      </div>

      <div class="button-row">
        <button class="clear-btn" id="clearBtn">초기화</button>
        <button class="ask-btn" id="askBtn">질문하기</button>
      </div>

      <div id="status" class="status"></div>

      <div>
        <div class="label">답변</div>
        <div id="answerBox" class="answer-box">아직 답변이 없습니다.</div>
      </div>
    </div>
  </div>

  <script>
    // 여기에 본인의 OpenAI API Key를 입력하세요.
    // 예: const OPENAI_API_KEY = 'sk-proj-...';
    const OPENAI_API_KEY = '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';

    const questionInput = document.getElementById('questionInput');
    const answerBox = document.getElementById('answerBox');
    const statusBox = document.getElementById('status');
    const askBtn = document.getElementById('askBtn');
    const clearBtn = document.getElementById('clearBtn');
    const modelSelect = document.getElementById('modelSelect');
    const systemInput = document.getElementById('systemInput');

    askBtn.addEventListener('click', askChatGPT);
    clearBtn.addEventListener('click', clearPage);

    questionInput.addEventListener('keydown', function(event) {
      if (event.key === 'Enter' && event.ctrlKey) {
        askChatGPT();
      }
    });

    async function askChatGPT() {
      const question = questionInput.value.trim();
      const systemMessage = systemInput.value.trim();
      const selectedModel = modelSelect.value;

      if (!question) {
        alert('질문을 입력해주세요.');
        return;
      }

      if (!OPENAI_API_KEY || OPENAI_API_KEY === '여기에_API_KEY_입력') {
        alert('코드 상단의 OPENAI_API_KEY에 본인의 API Key를 입력해주세요.');
        return;
      }

      try {
        setLoading(true);
        answerBox.textContent = '답변을 생성하는 중입니다...';
        statusBox.textContent = 'OpenAI API에 요청을 보내는 중입니다.';

        const response = await fetch('https://api.openai.com/v1/responses', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${OPENAI_API_KEY}`
          },
          body: JSON.stringify({
            model: selectedModel,
            input: [
              {
                role: 'system',
                content: systemMessage || '너는 친절한 한국어 AI 선생님이야.'
              },
              {
                role: 'user',
                content: question
              }
            ]
          })
        });

        const data = await response.json();

        if (!response.ok) {
          console.error(data);
          const message = data.error?.message || '알 수 없는 오류가 발생했습니다.';
          throw new Error(message);
        }

        const answer = data.output_text || extractTextFromResponse(data);
        answerBox.textContent = answer || '답변을 가져오지 못했습니다.';
        statusBox.textContent = '답변 생성 완료';
      } catch (error) {
        console.error(error);
        answerBox.textContent = '오류가 발생했습니다.\n\n' + error.message;
        statusBox.textContent = '요청 실패';
      } finally {
        setLoading(false);
      }
    }

    function extractTextFromResponse(data) {
      try {
        return data.output
          .flatMap(item => item.content || [])
          .filter(content => content.type === 'output_text')
          .map(content => content.text)
          .join('\n');
      } catch (error) {
        return '';
      }
    }

    function setLoading(isLoading) {
      askBtn.disabled = isLoading;
      askBtn.textContent = isLoading ? '생성 중...' : '질문하기';
    }

    function clearPage() {
      questionInput.value = '';
      answerBox.textContent = '아직 답변이 없습니다.';
      statusBox.textContent = '';
    }
  </script>
</body>
</html>
